name: flutter_auth_app
description: A Flutter authentication app with login, registration, and dashboard screens.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  cupertino_icons: ^1.0.2
  provider: ^6.0.0
  http: ^1.1.0
  flutter_dotenv: ^5.1.0
  cached_network_image: ^3.3.1
  firebase_core: ^2.28.0
  firebase_auth: ^4.17.0
  google_sign_in: ^6.2.0
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - .env
